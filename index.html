<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>《未来生存法则》</title>
  <meta name="description" content="未来生存法则 在线阅读">
  <meta name="theme-color" content="#1a5490">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4.13.0/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.css">
  <style>
    :root {
      --theme-color: #1a5490;
      --theme-color-dark: #0f3a66;
      --theme-color-light: #f4d58d;
      --sidebar-width: 300px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif; line-height: 1.75; }
    .markdown-section h1 { color: var(--theme-color); border-bottom: 2px solid var(--theme-color-light); padding-bottom: .3em; }
    .markdown-section h2 { color: var(--theme-color-dark); border-left: 4px solid var(--theme-color-light); padding-left: .5em; }
    .markdown-section blockquote { border-left: 4px solid var(--theme-color); background: #f0f5fb; }
    .sidebar { background: #fafbfc; }
    .sidebar ul li.active > a { color: var(--theme-color); border-left: 3px solid var(--theme-color); background: #f0f5fb; }
    .app-name-link { color: var(--theme-color) !important; font-weight: 600; }
    .markdown-section a { color: var(--theme-color-dark); text-decoration: none; border-bottom: 1px dotted var(--theme-color-light); }
    .markdown-section a:hover { color: var(--theme-color); border-bottom-color: var(--theme-color); }
    code, pre { font-family: "JetBrains Mono", Consolas, Monaco, monospace; }
    .markdown-section table { display: table; width: 100%; }
    .markdown-section table tr:nth-child(2n) { background: #f0f5fb; }
    .markdown-section p.tip { background: #fff8e8; border-left-color: var(--theme-color-light); }
    .markdown-section strong { color: var(--theme-color-dark); }
  </style>
</head>
<body>
  <div id="app">加载中…</div>
  <script>
    window.$docsify = {
      name: '未来生存法则',
      repo: '',
      loadSidebar: true,
      loadNavbar: true,
      auto2top: true,
      subMaxLevel: 2,
      maxLevel: 4,
      search: { placeholder: '搜索', noData: '没有找到结果', paths: 'auto', depth: 6 },
      pagination: { previousText: '上一章', nextText: '下一章', crossChapter: true },
      copyCode: { buttonText: '复制', errorText: '复制失败', successText: '已复制' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.0/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.0/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2.10.1/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@3.0.3/dist/docsify-copy-code.min.js"></script>
</body>
</html>
